services:
  postgres:
    image: postgres:bullseye
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fluxify_alpha
    volumes:
      - fluxify_pg_volume:/var/lib/postgresql/data
    networks:
      - default
  valkey:
    image: valkey/valkey:9.0-alpine
    container_name: valkey
    ports:
      - 6379:6379
    networks:
      - default
  caddy:
    image: caddy:2.6.4-alpine
    container_name: caddy
    ports:
      - 8080:8080
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile
    networks:
      - default
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    ports:
      - 5080:5080
    environment:
      - ZO_ROOT_USER_EMAIL=root@example.com
      - ZO_ROOT_USER_PASSWORD=Root@Example123
    networks:
      - default

  # =========================================================================
  # ARIZE PHOENIX (Open-Source AI Observability & OTel Trace Collector)
  # =========================================================================
  # Phoenix is an AI-focused tracing collector that visualizes chat history,
  # tool calls, token costs, and regular system microservice traces.
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    restart: unless-stopped
    ports:
      - 6006:6006 # Main Web UI Dashboard
      # - 4317:4317 # Standard OpenTelemetry (OTel) gRPC collector port
      - 4318:4318 # Standard OpenTelemetry (OTel) HTTP/JSON collector port
    environment:
      # UNUSUAL/IMPORTANT ENV: Phoenix runs with zero authentication by default,
      # which is perfect for local testing. If you put this on a public server, 
      # you must set PHOENIX_ENABLE_AUTH=true and provide a PHOENIX_SECRET_KEY.
      - PHOENIX_PORT=6006
      - PHOENIX_GRPC_PORT=4317
      # UNUSUAL PROPERTY (Collector vs Backend): Unlike OpenObserve which uses
      # dedicated tables/indices for generic log storage, Phoenix processes
      # OTel spans instantly in memory to build live execution trace trees.
    networks:
      - default

volumes:
  fluxify_pg_volume:
networks:
  default:
    driver: bridge
