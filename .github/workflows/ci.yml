name: CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"] # version tags trigger the admin + worker release build
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      lib: ${{ steps.filter.outputs.lib }}
      adapters: ${{ steps.filter.outputs.adapters }}
      blocks: ${{ steps.filter.outputs.blocks }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lib:
              - 'packages/lib/**'
            adapters:
              - 'packages/adapters/**'
              - 'packages/lib/**'
            blocks:
              - 'packages/blocks/**'
              - 'packages/adapters/**'
              - 'packages/lib/**'
            server:
              - 'apps/server/**'
              - 'packages/**'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Dependencies
        run: bun install
      - name: Build Portal (generates TanStack route tree for lint)
        run: bun run build --filter=@fluxify/portal
      - name: Run Lint
        run: bun run lint
      - name: Run Analyzer
        run: bun run analyze

  test-packages-lib:
    needs: detect-changes
    if: needs.detect-changes.outputs.lib == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Dependencies
        run: bun install
      - name: Run Lib Tests
        run: bun run test:lib

  test-packages-blocks:
    needs: detect-changes
    if: needs.detect-changes.outputs.blocks == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Dependencies
        run: bun install
      - name: Generate MASTER_ENCRYPTION_KEY
        run: echo "MASTER_ENCRYPTION_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
      - name: Run Blocks Tests
        run: bun run test:blocks

  test-packages-adapters:
    needs: detect-changes
    if: needs.detect-changes.outputs.adapters == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Dependencies
        run: bun install
      - name: Generate MASTER_ENCRYPTION_KEY
        run: echo "MASTER_ENCRYPTION_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
      - name: Run Adapters Tests
        run: bun run test:adapters

  test-apps-server-unit:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Dependencies
        run: bun install
      - name: Generate MASTER_ENCRYPTION_KEY
        run: echo "MASTER_ENCRYPTION_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
      - name: Run Server Unit Tests
        run: bun run test:server:unit

  test-apps-server-integration:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install Dependencies
        run: bun install
      - name: Generate MASTER_ENCRYPTION_KEY
        run: echo "MASTER_ENCRYPTION_KEY=$(openssl rand -base64 32)" >> $GITHUB_ENV
      - name: Run Server Integration Tests
        run: bun run test:server:integration

  # Kit is the exception: every push to main publishes a rolling `nightly` build.
  # Versioned/`latest` kit images come from the tagged release job below.
  build-and-push:
    needs: [lint, test-packages-lib, test-packages-blocks, test-packages-adapters, test-apps-server-unit, test-apps-server-integration]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository_owner == 'Fluxify-rest'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute nightly timestamp (UTC, YY-MM-DD-HHMM)
        id: ts
        run: echo "stamp=$(date -u +'%y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Lowercase Repo Owner
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Kit (nightly)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/kit/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/fluxify-kit:nightly
            ghcr.io/${{ steps.owner.outputs.owner }}/fluxify-kit:nightly-${{ steps.ts.outputs.stamp }}

  # Kit, admin and worker versioned images build ONLY on version tags (e.g. v1.2.3).
  build-and-push-release:
    needs: [lint, test-packages-lib, test-packages-blocks, test-packages-adapters, test-apps-server-unit, test-apps-server-integration]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      github.repository_owner == 'Fluxify-rest'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: fluxify-kit
            dockerfile: docker/kit/Dockerfile
          - image: fluxify-admin
            dockerfile: docker/admin/Dockerfile
          - image: fluxify-worker
            dockerfile: docker/worker/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repo Owner
        id: owner
        run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ steps.owner.outputs.owner }}/${{ matrix.image }}:latest
