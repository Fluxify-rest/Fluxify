name: publish-gh-pages

on:
  push:
    branches:
      - master
      - main
    paths:
      - "docs/**"
      - ".github/workflows/gh-pages.yml"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant write access so the action can push to gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

# Only one deploy at a time; cancel in-progress runs if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'Fluxify-rest/Fluxify'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git-based lastUpdated timestamps

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Build VitePress docs
        run: bun run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.repository == 'Fluxify-rest/Fluxify'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
